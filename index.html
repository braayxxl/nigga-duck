<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>NiggaDuck — Cross to the Whip</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1a0a2e;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:'Courier New', monospace;
  overflow:hidden;
}

#ui {
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:100;
  background:rgba(15,5,30,0.92);
  backdrop-filter:blur(8px);
}
#ui h1 {
  font-size:48px;
  font-weight:900;
  background:linear-gradient(135deg,#fff700,#ff6b00,#ff006e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  letter-spacing:0.06em;
  margin-bottom:8px;
  text-shadow:none;
  filter:drop-shadow(0 0 20px rgba(255,200,0,0.5));
}
#ui .sub {
  color:#aaa;
  font-size:13px;
  margin-bottom:32px;
  letter-spacing:0.1em;
  text-transform:uppercase;
}
#ui .instructions {
  color:#ccc;
  font-size:14px;
  text-align:center;
  line-height:2;
  margin-bottom:32px;
}
#ui .instructions span { color:#fff700; font-weight:700; }
#start-btn {
  background:linear-gradient(135deg,#fff700,#ff9500);
  color:#1a0a2e;
  border:none;
  padding:16px 48px;
  font-size:18px;
  font-weight:900;
  letter-spacing:0.1em;
  border-radius:50px;
  cursor:pointer;
  text-transform:uppercase;
  box-shadow:0 0 30px rgba(255,200,0,0.5);
  transition:transform 0.1s;
}
#start-btn:hover{transform:scale(1.05);}
#start-btn:active{transform:scale(0.97);}

#game-over-ui {
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:100;
  background:rgba(15,5,30,0.92);
  backdrop-filter:blur(8px);
}
#game-over-ui h2 {
  font-size:52px;
  font-weight:900;
  color:#ff3366;
  filter:drop-shadow(0 0 20px rgba(255,50,100,0.6));
  margin-bottom:12px;
  letter-spacing:0.06em;
}
#game-over-ui .score-display {
  font-size:20px;
  color:#fff;
  margin-bottom:8px;
}
#game-over-ui .score-display span { color:#fff700; font-weight:700; }
#game-over-ui .high-score {
  font-size:14px;
  color:#aaa;
  margin-bottom:32px;
  letter-spacing:0.08em;
}

#win-ui {
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:100;
  background:rgba(15,5,30,0.92);
  backdrop-filter:blur(8px);
}
#win-ui h2 {
  font-size:48px;
  font-weight:900;
  background:linear-gradient(135deg,#fff700,#00ffaa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(0,255,170,0.5));
  margin-bottom:12px;
}
#win-ui p {
  color:#ccc;
  font-size:16px;
  margin-bottom:32px;
}

.retry-btn {
  background:linear-gradient(135deg,#ff3366,#9900ff);
  color:#fff;
  border:none;
  padding:14px 40px;
  font-size:16px;
  font-weight:900;
  letter-spacing:0.1em;
  border-radius:50px;
  cursor:pointer;
  text-transform:uppercase;
  box-shadow:0 0 20px rgba(255,50,100,0.4);
  transition:transform 0.1s;
  margin-top:8px;
}
.retry-btn:hover{transform:scale(1.05);}

canvas {
  display:block;
  border-radius:12px;
  box-shadow:0 0 60px rgba(139,92,246,0.4), 0 0 120px rgba(0,212,255,0.1);
}

#hud {
  position:fixed;
  top:16px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:32px;
  align-items:center;
  z-index:50;
  pointer-events:none;
}
.hud-item {
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;
  padding:6px 16px;
  color:#fff;
  font-size:13px;
  font-weight:700;
  letter-spacing:0.06em;
}
.hud-item span { color:#fff700; }
.lives-hearts { letter-spacing:2px; }

/* ===================== MOBILE D-PAD ===================== */
#mobile-controls {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 60;
  padding: 12px 16px 20px;
  background: linear-gradient(to top, rgba(10,5,20,0.92) 0%, rgba(10,5,20,0.0) 100%);
  pointer-events: none;
}
#dpad-wrap {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  width: 100%;
  pointer-events: none;
}
#dpad {
  display: grid;
  grid-template-columns: 52px 52px 52px;
  grid-template-rows: 52px 52px 52px;
  gap: 4px;
  pointer-events: none;
}
.dpad-btn {
  width: 52px;
  height: 52px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  pointer-events: all;
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.08s, transform 0.08s;
  backdrop-filter: blur(4px);
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
}
.dpad-btn:active, .dpad-btn.pressed {
  background: rgba(255,215,0,0.22);
  border-color: rgba(255,215,0,0.6);
  transform: scale(0.93);
  color: #fff700;
  box-shadow: 0 0 14px rgba(255,215,0,0.3);
}
.dpad-btn.center { background: transparent; border: none; box-shadow: none; pointer-events: none; }
#right-btns {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
  pointer-events: none;
}
.action-btn {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  cursor: pointer;
  pointer-events: all;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.08s;
  box-shadow: 0 2px 16px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  backdrop-filter: blur(6px);
}
.action-btn:active { transform: scale(0.9); }
#shoot-btn {
  background: radial-gradient(circle at 40% 35%, rgba(255,247,0,0.25), rgba(255,100,0,0.12));
  border-color: rgba(255,200,0,0.4);
  box-shadow: 0 0 18px rgba(255,200,0,0.2), 0 2px 16px rgba(0,0,0,0.5);
}
#shoot-btn:active {
  background: radial-gradient(circle at 40% 35%, rgba(255,247,0,0.5), rgba(255,100,0,0.3));
  box-shadow: 0 0 28px rgba(255,200,0,0.5);
}
#shop-btn-mobile {
  background: radial-gradient(circle at 40% 35%, rgba(0,255,136,0.15), rgba(0,100,60,0.1));
  border-color: rgba(0,255,136,0.35);
  width: 52px;
  height: 52px;
  font-size: 18px;
  box-shadow: 0 0 12px rgba(0,255,136,0.15), 0 2px 10px rgba(0,0,0,0.5);
}
#shop-btn-mobile:active {
  background: radial-gradient(circle at 40% 35%, rgba(0,255,136,0.4), rgba(0,150,80,0.2));
  box-shadow: 0 0 24px rgba(0,255,136,0.4);
}
@media (pointer: coarse), (max-width: 768px) {
  #mobile-controls { display: block; }
  #hud { gap: 10px; }
  .hud-item { font-size: 11px; padding: 4px 10px; }
  canvas { border-radius: 8px; }
}
</style>
</head>
<body>

<!-- MAIN MENU -->
<div id="ui">
  <h1>🦆 NIGGA DUCK</h1>
  <div class="sub">Endless Runner</div>
  <div class="instructions">
    <span>← →</span> or <span>A D</span> to dodge<br>
    <span>SPACE</span> to shoot (if strapped)<br>
    Duck runs forever — <span>don't get smoked</span><br>
    Grab guns off the ground. Score = distance.
  </div>
  <button id="start-btn" onclick="startGame()">LETS GET IT 🤝</button>
</div>

<!-- GAME OVER -->
<div id="game-over-ui">
  <h2>💀 SMOKED</h2>
  <div class="score-display">Score: <span id="final-score">0</span></div>
  <div class="high-score" id="high-score-display"></div>
  <button class="retry-btn" onclick="startGame()">Run It Back</button>
</div>



<!-- PICKUP TOAST -->
<div id="pickup-toast" style="display:none;position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);border-radius:16px;padding:10px 24px;font-family:Courier New;font-size:15px;font-weight:700;letter-spacing:0.08em;z-index:80;pointer-events:none;border:1px solid rgba(255,255,255,0.15);transition:opacity 0.4s;"></div>



<!-- HUD -->
<div id="hud" style="display:none;">
  <div class="hud-item">🏃 <span id="score-display">0</span>m</div>
  <div class="hud-item lives-hearts" id="lives-display">❤️❤️❤️</div>
  <div class="hud-item" id="buffs-display" style="color:#ffd700;min-width:40px;"></div>
  <div class="hud-item">Best: <span id="best-display">0</span>m</div>
</div>

<!-- MOBILE D-PAD CONTROLS -->
<div id="mobile-controls">
  <div id="dpad-wrap">
    <!-- Left/Right only for endless runner -->
    <div id="dpad" style="display:flex;gap:12px;">
      <div class="dpad-btn" id="btn-left" style="width:72px;height:72px;font-size:28px;" ontouchstart="mobileMove('left',true);" ontouchend="mobileMove('left',false);">←</div>
      <div class="dpad-btn" id="btn-right" style="width:72px;height:72px;font-size:28px;" ontouchstart="mobileMove('right',true);" ontouchend="mobileMove('right',false);">→</div>
    </div>
    <!-- Right action buttons -->
    <div id="right-btns">
      <div class="action-btn" id="shoot-btn"
           ontouchstart="mobileFire();"
           style="display:none;">🔫</div>
    
    </div>
  </div>
</div>

<!-- Always-visible volume slider -->
<div id="vol-bar" style="position:fixed;bottom:12px;right:16px;z-index:999;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:6px 14px;">
  <span style="font-size:14px;">🔊</span>
  <input id="vol-slider" type="range" min="0" max="1" step="0.01" value="0.3"
    style="width:80px;accent-color:#fff700;cursor:pointer;"
    oninput="setMasterVolume(this.value)">
  <span id="vol-pct" style="color:#fff700;font-family:Courier New;font-size:11px;min-width:28px;">30%</span>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Grid dimensions
const COLS = 11;
const ROWS = 19; // kept for compatibility, but endless uses worldRow
let CELL;
let W, H;

// =============================================
// ENDLESS RUNNER STATE
// =============================================
let worldRow = 0;          // how many rows the duck has traveled (float)
let runSpeed = 0.018;      // rows per frame auto-advance
let distanceScore = 0;     // meters traveled
let lanePool = [];         // procedurally generated lane definitions
let LANE_POOL_SIZE = 40;   // keep this many lanes ahead
let duckWorldRow = 0;      // duck's absolute world row position
let duckSubRow = 0;        // sub-row float (for smooth auto-advance)

// Procedural lane generation
const LANE_TYPES = ['road','road','road','road','safe','road','road','safe'];
const CAR_COLORS = ['#cc3333','#2255aa','#cc3399','#558833','#aa6600','#0066cc','#884400','#cc6600','#993333','#6600cc','#1144bb','#aa3399','#cc4400','#cc0000'];
const VEH_TYPES  = ['sedan','sedan','sedan','suv','pickup','bus','sports','sedan','suv'];

function generateLane(index) {
  const typeRoll = LANE_TYPES[index % LANE_TYPES.length];
  const isSafe   = typeRoll === 'safe';
  const dir      = Math.random() < 0.5 ? 1 : -1;
  const baseSpeed = 0.008 + Math.min(distanceScore / 3000, 0.025); // speed up over time
  const vtype    = VEH_TYPES[Math.floor(Math.random() * VEH_TYPES.length)];
  const vcount   = (vtype === 'bus' || vtype === 'pickup') ? 1 : 2;
  const vwidth   = VEHICLE_WIDTHS[vtype] || 1.6;
  const color    = CAR_COLORS[Math.floor(Math.random() * CAR_COLORS.length)];

  const cars = [];
  if (!isSafe) {
    for (let i = 0; i < vcount; i++) {
      cars.push({
        x: (i / vcount) * COLS + Math.random() * 2,
        dir, color, type: vtype, width: vwidth,
        speed: baseSpeed * (0.8 + Math.random() * 0.5),
      });
    }
  }

  // Pickups on safe lanes occasionally
  let pickup = null;
  if (isSafe && Math.random() < 0.35) {
    const kinds = ['glock','glock','gold_glock','draco','ammo'];
    const weights = [0.35, 0.35, 0.18, 0.07, 0.05];
    let r = Math.random(), kind = 'glock';
    let acc = 0;
    for (let k = 0; k < kinds.length; k++) { acc += weights[k]; if (r < acc) { kind = kinds[k]; break; } }
    pickup = { col: 1 + Math.floor(Math.random() * (COLS - 2)), kind, collected: false, bob: Math.random() * Math.PI * 2 };
  }

  // Money on safe lanes
  let money = null;
  if (isSafe && Math.random() < 0.5) {
    money = { col: 1 + Math.floor(Math.random() * (COLS - 2)), value: 50 + Math.floor(Math.random() * 3) * 50, collected: false, bob: Math.random() * Math.PI * 2 };
  }

  // Frog enemies occasionally on road lanes level 2+
  let frog = null;
  if (!isSafe && Math.random() < 0.08 && distanceScore > 200) {
    frog = { col: Math.floor(Math.random() * COLS), shootTimer: 120 + Math.random() * 80 };
  }

  return { index, isSafe, cars, pickup, money, frog };
}

function ensureLanePool() {
  // Make sure we have lanes far enough ahead
  while (lanePool.length < LANE_POOL_SIZE) {
    const nextIndex = lanePool.length > 0 ? lanePool[lanePool.length - 1].index + 1 : 0;
    lanePool.push(generateLane(nextIndex));
  }
  // Trim lanes far behind the duck
  while (lanePool.length > 0 && lanePool[0].index < duckWorldRow - 8) {
    lanePool.shift();
  }
}

// =============================================
// CAMERA
// =============================================
let camRow = 0;        // now tracks world row (float)
const CAM_VISIBLE_ROWS = 10;
const DUCK_SCREEN_ROW = 2.5; // how many rows from bottom duck appears

function updateCamera() {
  // Camera locked to duck, duck always appears near bottom
  camRow = duckWorldRow - DUCK_SCREEN_ROW;
}

// =============================================
// ISOMETRIC HELPERS
// =============================================
function toIso(col, worldR) {
  const tileW = CELL * 1.5;
  const tileH = CELL * 0.75;
  const relRow = worldR - camRow;
  // Invert: lower worldRow (further ahead) = higher on screen
  const screenRow = CAM_VISIBLE_ROWS - relRow;
  const x = (col - screenRow) * (tileW / 2) + W / 2;
  const y = (col + screenRow) * (tileH / 2) + CELL * 0.5;
  return { x, y };
}

// Draw an isometric diamond tile (top face)
function isoTile(cx, cy, fillStyle, strokeStyle, alpha) {
  const hw = CELL * 0.75; // half width
  const hh = CELL * 0.375; // half height
  ctx.save();
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.moveTo(cx,      cy - hh);
  ctx.lineTo(cx + hw, cy);
  ctx.lineTo(cx,      cy + hh);
  ctx.lineTo(cx - hw, cy);
  ctx.closePath();
  ctx.fillStyle = fillStyle;
  ctx.fill();
  if (strokeStyle) {
    ctx.strokeStyle = strokeStyle;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  ctx.restore();
}

// Draw left side face of a tile (going down)
function isoSideLeft(cx, cy, height, fillStyle) {
  const hw = CELL * 0.75;
  const hh = CELL * 0.375;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx - hw, cy);
  ctx.lineTo(cx,      cy + hh);
  ctx.lineTo(cx,      cy + hh + height);
  ctx.lineTo(cx - hw, cy + height);
  ctx.closePath();
  ctx.fillStyle = fillStyle;
  ctx.fill();
  ctx.restore();
}

// Draw right side face of a tile
function isoSideRight(cx, cy, height, fillStyle) {
  const hw = CELL * 0.75;
  const hh = CELL * 0.375;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx + hw, cy);
  ctx.lineTo(cx,      cy + hh);
  ctx.lineTo(cx,      cy + hh + height);
  ctx.lineTo(cx + hw, cy + height);
  ctx.closePath();
  ctx.fillStyle = fillStyle;
  ctx.fill();
  ctx.restore();
}

function resize() {
  const maxW = window.innerWidth - 8;
  const maxH = window.innerHeight - (window.innerWidth <= 768 ? 180 : 60);
  const cellByW = Math.floor(maxW / ((COLS + CAM_VISIBLE_ROWS) * 0.75 + 1));
  const cellByH = Math.floor(maxH / ((COLS + CAM_VISIBLE_ROWS) * 0.4 + 2));
  CELL = Math.max(28, Math.min(cellByW, cellByH, 60));
  W = Math.ceil((COLS + CAM_VISIBLE_ROWS) * CELL * 0.75 + CELL * 2);
  H = Math.ceil((COLS + CAM_VISIBLE_ROWS) * CELL * 0.4 + CELL * 3);
  canvas.width = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', () => { resize(); if(gameRunning) drawAll(); });

// =============================================
// GAME STATE (unchanged)
// =============================================
let gameRunning = false;
let score = 0;
let highScore = 0;
let lives = 3;
let duck = { col: 4, row: ROWS - 1 };
let bullets = [];
let hoodBullets = [];
let frogs = [];
let cars = [];
let frameCount = 0;
let invincible = 0;
let particles = [];
let flashEffect = 0;
let currentLevel = 1;
let transitioning = false;
let transitionTimer = 0;
let transitionMsg = '';

// Economy
let racks = 0;
let armor = 0;
let rolex = false;
let maxLives = 3;

// Weapon system — pickup based
// gun: 0=none, 1=glock, 2=gold_glock, 3=draco
let gun = 0;
let ammo = 0;
let duckBullets = [];
let shootCD = 0;
let enemyHP = {};
let screenShake = 0;

// Pickup items on ground
let groundPickups = [];

// Hood enemies
let hoodEnemies = [];

// =============================================
// AUDIO SYSTEM (unchanged)
// =============================================
let masterVol = 0.3;
let audioCtx = null;
let bgGainNode = null;
let bgPlaying = false;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function setMasterVolume(val) {
  masterVol = parseFloat(val);
  const pct = document.getElementById('vol-pct');
  if (pct) pct.textContent = Math.round(masterVol * 100) + '%';
  if (bgGainNode) bgGainNode.gain.value = masterVol * 0.25;
}

let bangBuffer = null;
function loadBangBang() {
  fetch('https://www.myinstants.com/media/sounds/chief-keef.mp3')
    .then(r => r.arrayBuffer())
    .then(buf => getAudioCtx().decodeAudioData(buf))
    .then(decoded => { bangBuffer = decoded; })
    .catch(() => {});
}

const activeBangSources = [];

function playBangBang() {
  if (!bangBuffer || !audioCtx) return;
  if (masterVol === 0) return;
  try {
    const src = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    src.buffer = bangBuffer;
    gain.gain.value = masterVol * 0.7;
    gain.gain.setValueAtTime(masterVol * 0.7, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
    src.connect(gain);
    gain.connect(audioCtx.destination);
    src.start(0);
    src.stop(audioCtx.currentTime + 1.2);
    activeBangSources.push({src, gain});
    src.onended = () => {
      const idx = activeBangSources.findIndex(s => s.src === src);
      if (idx > -1) activeBangSources.splice(idx, 1);
    };
  } catch(e) {}
}

function stopAllBangSounds() {
  activeBangSources.forEach(({src, gain}) => {
    try {
      gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
      src.stop(audioCtx.currentTime + 0.1);
    } catch(e) {}
  });
  activeBangSources.length = 0;
}

function startBGMusic() {
  if (bgPlaying) return;
  bgPlaying = true;
  const ctx2 = getAudioCtx();
  bgGainNode = ctx2.createGain();
  bgGainNode.gain.value = masterVol * 0.25;
  bgGainNode.connect(ctx2.destination);

  const melody = [
    329.6, 392, 440, 523.3, 440, 392, 329.6, 0,
    349.2, 440, 493.9, 587.3, 493.9, 440, 349.2, 0,
    392, 493.9, 587.3, 659.3, 587.3, 493.9, 392, 0,
    349.2, 392, 440, 523.3, 440, 392, 349.2, 329.6,
  ];
  const bassline = [
    130.8, 0, 130.8, 0, 146.8, 0, 146.8, 0,
    174.6, 0, 174.6, 0, 196, 0, 196, 0,
    130.8, 0, 130.8, 0, 164.8, 0, 164.8, 0,
    146.8, 0, 146.8, 0, 130.8, 0, 130.8, 0,
  ];
  const bpm = 128;
  const step = 60 / bpm / 2;
  let i = 0;

  function playStep() {
    if (!bgPlaying) return;
    const now = ctx2.currentTime;
    if (melody[i] > 0) {
      const osc = ctx2.createOscillator();
      const g = ctx2.createGain();
      osc.type = 'square';
      osc.frequency.value = melody[i];
      g.gain.setValueAtTime(0.18, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + step * 0.7);
      osc.connect(g); g.connect(bgGainNode);
      osc.start(now); osc.stop(now + step * 0.7);
    }
    if (bassline[i] > 0) {
      const b = ctx2.createOscillator();
      const bg2 = ctx2.createGain();
      b.type = 'sine';
      b.frequency.value = bassline[i];
      bg2.gain.setValueAtTime(0.3, now);
      bg2.gain.exponentialRampToValueAtTime(0.001, now + step * 0.9);
      b.connect(bg2); bg2.connect(bgGainNode);
      b.start(now); b.stop(now + step * 0.9);
    }
    i = (i + 1) % melody.length;
    setTimeout(playStep, step * 1000);
  }
  playStep();
}

function stopBGMusic() {
  bgPlaying = false;
  if (bgGainNode) {
    bgGainNode.gain.setTargetAtTime(0, getAudioCtx().currentTime, 0.2);
  }
}

    lastDuckLine++;
  } catch(e) {}
}

function playGunshot(type) {
  if (!audioCtx || masterVol === 0) return;
  const ac = getAudioCtx();
  const now = ac.currentTime;
  if (type === 1) {
    // Glock — sharp pop
    const buf = ac.createBuffer(1, ac.sampleRate * 0.12, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i / (ac.sampleRate * 0.015));
    const src = ac.createBufferSource();
    const g = ac.createGain();
    src.buffer = buf; g.gain.value = masterVol * 0.9;
    src.connect(g); g.connect(ac.destination); src.start();
    // tone click
    const osc = ac.createOscillator();
    const og = ac.createGain();
    osc.frequency.value = 180; osc.type = 'square';
    og.gain.setValueAtTime(masterVol*0.4, now);
    og.gain.exponentialRampToValueAtTime(0.001, now+0.06);
    osc.connect(og); og.connect(ac.destination);
    osc.start(now); osc.stop(now+0.06);
  } else if (type === 2) {
    // Gold Glock w/ switch — rapid burst click
    for (let s = 0; s < 3; s++) {
      const t = now + s * 0.04;
      const osc = ac.createOscillator();
      const og = ac.createGain();
      osc.frequency.value = 220 + s * 30; osc.type = 'sawtooth';
      og.gain.setValueAtTime(masterVol*0.5, t);
      og.gain.exponentialRampToValueAtTime(0.001, t+0.05);
      osc.connect(og); og.connect(ac.destination);
      osc.start(t); osc.stop(t+0.05);
    }
  } else if (type === 3) {
    // Black Draco — deep heavy rattle
    const buf = ac.createBuffer(1, ac.sampleRate * 0.22, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i / (ac.sampleRate * 0.04));
    const src = ac.createBufferSource();
    const g = ac.createGain();
    src.buffer = buf; g.gain.value = masterVol * 1.2;
    const filter = ac.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 600;
    src.connect(filter); filter.connect(g); g.connect(ac.destination); src.start();
    // deep thump
    const osc = ac.createOscillator();
    const og = ac.createGain();
    osc.frequency.setValueAtTime(90, now); osc.frequency.exponentialRampToValueAtTime(30, now+0.15);
    osc.type = 'sine';
    og.gain.setValueAtTime(masterVol*0.8, now);
    og.gain.exponentialRampToValueAtTime(0.001, now+0.18);
    osc.connect(og); og.connect(ac.destination);
    osc.start(now); osc.stop(now+0.18);
    screenShake = 12;
  }
}

function playPickupSound(type) {
  if (!audioCtx || masterVol === 0) return;
  const ac = getAudioCtx();
  const now = ac.currentTime;
  const freqs = type === 'draco' ? [120,180,240] : type === 'gold_glock' ? [440,550,660] : [330,440,550];
  freqs.forEach((f, i) => {
    const osc = ac.createOscillator();
    const g = ac.createGain();
    const t = now + i * 0.06;
    osc.frequency.value = f; osc.type = 'sine';
    g.gain.setValueAtTime(masterVol*0.4, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.12);
    osc.connect(g); g.connect(ac.destination);
    osc.start(t); osc.stop(t+0.12);
  });
}

// =============================================
// ENDLESS GAME LOOP
// =============================================
function gameLoop() {
  if (!gameRunning) return;
  frameCount++;
  if (moveCD > 0) moveCD--;
  if (invincible > 0) invincible--;
  if (flashEffect > 0) flashEffect--;
  if (shootCD > 0) shootCD--;
  if (screenShake > 0) screenShake--;

  // Auto-advance: duck moves forward continuously
  runSpeed = 0.016 + Math.min(distanceScore / 5000, 0.032); // gradually speed up
  duckSubRow += runSpeed;
  if (duckSubRow >= 1) {
    duckWorldRow += Math.floor(duckSubRow);
    duckSubRow -= Math.floor(duckSubRow);
  }
  distanceScore += runSpeed * 3; // meters
  if (distanceScore > highScore) highScore = distanceScore;

  ensureLanePool();

  // Update vehicles in each lane
  for (const lane of lanePool) {
    for (const v of lane.cars) {
      v.x += v.speed * v.dir;
      if (v.dir === 1  && v.x > COLS + 1)       v.x = -v.width - 0.5;
      if (v.dir === -1 && v.x < -v.width - 1)   v.x = COLS + 0.5;
    }
    // Frog enemies
    if (lane.frog) {
      const f = lane.frog;
      f.shootTimer--;
      if (f.shootTimer <= 0) {
        f.shootTimer = 100 + Math.random() * 80;
        const dx = duck.col - f.col;
        const dy = duckWorldRow - lane.index;
        const dist = Math.sqrt(dx*dx+dy*dy)||1;
        const spd = 0.06 + distanceScore/10000;
        bullets.push({ x: f.col+0.5, wy: lane.index+0.5, vx:(dx/dist)*spd, vy:(dy/dist)*spd*0.3, life:120 });
      }
    }
  }

  // Duck bullets
  for (let i = duckBullets.length-1; i>=0; i--) {
    const db = duckBullets[i];
    db.x += db.vx; db.wy -= Math.abs(db.vy); db.life--;
    if (db.life <= 0) { duckBullets.splice(i,1); continue; }
    let hit = false;
    for (const lane of lanePool) {
      if (!lane.frog) continue;
      const f = lane.frog;
      if (Math.abs(db.x-(f.col+0.5)) < 0.7 && Math.abs(db.wy - lane.index) < 0.7) {
        const key = `f_${lane.index}`;
        if (!enemyHP[key]) enemyHP[key] = 3;
        enemyHP[key]--;
        spawnParticles(f.col+0.5, lane.index+0.5, '#00ff88');
        if (enemyHP[key] <= 0) { lane.frog = null; distanceScore += 50; }
        duckBullets.splice(i,1); hit=true; break;
      }
    }
  }

  // Enemy bullets movement
  for (let i = bullets.length-1; i>=0; i--) {
    bullets[i].x  += bullets[i].vx;
    bullets[i].wy += bullets[i].vy;
    bullets[i].life--;
    if (bullets[i].life<=0 || bullets[i].x<-1 || bullets[i].x>COLS+1) bullets.splice(i,1);
  }

  // Collision: duck vs lane cars (duck is on lane.index == duckWorldRow)
  if (invincible === 0) {
    const duckLane = lanePool.find(l => l.index === duckWorldRow);
    if (duckLane) {
      for (const v of duckLane.cars) {
        const vL = v.x, vR = v.x + v.width;
        const dL = duck.col+0.1, dR = duck.col+0.9;
        if (dR > vL && dL < vR) { takeDamage('car'); break; }
      }
    }
    // Duck vs enemy bullets
    for (let i = bullets.length-1; i>=0; i--) {
      const b = bullets[i];
      if (Math.abs(b.x-0.5-duck.col)<0.7 && Math.abs(b.wy - duckWorldRow)<0.8) {
        bullets.splice(i,1); takeDamage('bullet'); break;
      }
    }
  }

  // Pickups & money — check current lane
  const curLane = lanePool.find(l => l.index === duckWorldRow);
  if (curLane) {
    if (curLane.pickup && !curLane.pickup.collected && curLane.pickup.col === duck.col) {
      const p = curLane.pickup; p.collected = true;
      playPickupSound(p.kind);
      if (p.kind==='glock')      { gun=Math.max(gun,1); ammo+=8;  showPickupToast('GLOCK — 8 rounds','#fff'); }
      else if(p.kind==='gold_glock') { gun=Math.max(gun,2); ammo+=12; showPickupToast('GOLD GLOCK W/ SWITCH 🔥 — 12 rounds','#ffd700'); }
      else if(p.kind==='draco')  { gun=3; ammo+=20; showPickupToast('BLACK DRACO 🐉 — 20 rounds. GO CRAZY.','#ff4400'); }
      else if(p.kind==='ammo')   { const b=gun===3?10:gun===2?8:6; ammo+=b; showPickupToast('AMMO +'+b,'#88ff88'); }
      spawnParticles(duck.col+0.5, duckWorldRow+0.5, '#ffd700');
      updateHUD(); updateMobileButtons();
    }
    if (curLane.money && !curLane.money.collected && curLane.money.col === duck.col) {
      curLane.money.collected = true;
      distanceScore += curLane.money.value * 0.5;
      spawnParticles(duck.col+0.5, duckWorldRow+0.5, '#00ff88');
      updateHUD();
    }
  }

  tryDuckSpeak();

  for (let i=particles.length-1; i>=0; i--) {
    const p=particles[i]; p.wx+=p.vx; p.wy+=p.vy; p.life--;
    if(p.life<=0) particles.splice(i,1);
  }

  if (frameCount % 3 === 0) updateHUD();
  updateCamera();
  drawAll();
  requestAnimationFrame(gameLoop);
}

function takeDamage(type) {
  if (invincible > 0) return;
  if (rolex && Math.random() < 0.3) {
    invincible = 40; spawnParticlesGrid(duck.col+0.5, duck.row+0.5, '#ffd700'); return;
  }
  if (armor > 0) {
    armor--; invincible = 60; flashEffect = 10;
    spawnParticlesGrid(duck.col+0.5, duck.row+0.5, '#aaaaff'); updateHUD(); return;
  }
  lives--; invincible = 90; flashEffect = 20;
  const colors = { bullet:'#00ff88', hood:'#ff9900', car:'#ff4444' };
  spawnParticlesGrid(duck.col + 0.5, duck.row + 0.5, colors[type]||'#ff4444');
  score = Math.max(0, score - 20); updateHUD();
  if (lives <= 0) { setTimeout(gameOver, 300); gameRunning = false; }
}

// Particles stored in world coords, converted to screen each frame
function spawnParticles(gx, gy, color) {
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    particles.push({
      wx: gx - 0.5,
      wy: gy - 0.5,
      vx: Math.cos(angle) * 0.04,
      vy: Math.sin(angle) * 0.04,
      color,
      life: 30 + Math.random() * 20,
    });
  }
}

function spawnParticlesGrid(gx, gy, color) {
  spawnParticles(gx, gy, color);
}

function gameOver() {
  gameRunning = false; stopBGMusic(); stopAllBangSounds(); stopDuckVoice();
  document.getElementById('hud').style.display = 'none';
  document.getElementById('final-score').textContent = Math.floor(distanceScore);
  const isHigh = distanceScore >= highScore;
  document.getElementById('high-score-display').textContent = isHigh ? '🏆 NEW HIGH SCORE!' : 'Best: ' + Math.floor(highScore) + 'm';
  document.getElementById('game-over-ui').style.display = 'flex';
}

function winGame() { gameOver(); } // no win condition in endless

// =============================================
// ISOMETRIC DRAWING SYSTEM
// =============================================

function getTileColor(row) {
  if (row === GOAL_ROW) return { top: '#1a3a0a', side: '#0e2306', glow: '#ffd700' };
  if (ROAD_ROWS_TOP.includes(row)) {
    return row % 2 === 0
      ? { top: '#1e1e32', side: '#12122a' }
      : { top: '#191929', side: '#0f0f20' };
  }
  if (SAFE_ROWS.includes(row)) return { top: '#1a3a1a', side: '#0d2610', elevated: true };
  if (ROAD_ROWS_BOT.includes(row)) {
    return row % 2 === 0
      ? { top: '#1e1e32', side: '#12122a' }
      : { top: '#191929', side: '#0f0f20' };
  }
  if (row === START_ROW) return { top: '#1e2e1e', side: '#141e14' };
  return { top: '#1a1a2e', side: '#111122' };
}

function drawIsoGrid() {
  // Draw visible lanes from lane pool
  const firstWR = Math.floor(camRow - 2);
  const lastWR  = Math.ceil(camRow + CAM_VISIBLE_ROWS + 2);
  for (let r = firstWR; r <= lastWR; r++) {
    for (let c = 0; c < COLS; c++) {
      drawEndlessTile(c, r);
    }
  }
}

function getLaneByIndex(index) {
  return lanePool.find(l => l.index === index) || null;
}

function drawEndlessTile(col, worldR) {
  const lane = getLaneByIndex(worldR);
  const isSafe = lane ? lane.isSafe : (worldR % 8 < 2);
  const iso = toIso(col, worldR);
  const cx = iso.x, cy = iso.y;

  // Side faces
  const sideH = isSafe ? CELL*0.2 : CELL*0.07;
  const topColor  = isSafe ? '#1a3a1a' : (worldR % 2 === 0 ? '#1e1e32' : '#191929');
  const sideColor = isSafe ? '#0d2610' : (worldR % 2 === 0 ? '#12122a' : '#0f0f20');
  isoSideLeft(cx,  cy, sideH, sideColor);
  isoSideRight(cx, cy, sideH, darkenHex(topColor, 0.6));

  if (isSafe) {
    ctx.save(); ctx.shadowColor='#00aa44'; ctx.shadowBlur=4;
    isoTile(cx, cy, topColor, 'rgba(60,160,60,0.2)');
    ctx.restore();
    if ((col+worldR)%3===0) {
      ctx.save(); ctx.strokeStyle='rgba(80,200,80,0.35)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(cx-4,cy); ctx.lineTo(cx-6,cy-5);
      ctx.moveTo(cx,cy);   ctx.lineTo(cx,cy-6);
      ctx.moveTo(cx+4,cy); ctx.lineTo(cx+5,cy-4);
      ctx.stroke(); ctx.restore();
    }
    // Building on col 0 and COLS-1
    if (col === 0 || col === COLS-1) drawIsoBuilding(col, worldR);
  } else {
    isoTile(cx, cy, topColor, 'rgba(80,80,100,0.1)');
    // Lane dashes
    if (col%2===0) {
      ctx.save(); ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1;
      ctx.setLineDash([3,5]);
      const isoR = toIso(col+1, worldR);
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(isoR.x, isoR.y); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
    }
  }
}

function drawIsoBuilding(col, worldR) {
  const iso = toIso(col, worldR);
  const cx = iso.x + (col === 0 ? -CELL*0.6 : CELL*0.6);
  const cy = iso.y - CELL*0.1;
  const bh = CELL*(0.7 + ((col+worldR)%3)*0.25);
  const bw = CELL*0.55;
  const hh2 = CELL*0.25;
  const bcolor = ['#1a1a3a','#2a1a3a','#1a2a3a','#2a2a1a'][(col+worldR)%4];

  ctx.save();
  // Top
  ctx.fillStyle = lightenHex(bcolor, 0.2);
  ctx.beginPath(); ctx.moveTo(cx,cy-bh-hh2); ctx.lineTo(cx+bw,cy-bh); ctx.lineTo(cx,cy-bh+hh2); ctx.lineTo(cx-bw,cy-bh); ctx.closePath(); ctx.fill();
  // Left
  ctx.fillStyle = bcolor;
  ctx.beginPath(); ctx.moveTo(cx-bw,cy-bh); ctx.lineTo(cx,cy-bh+hh2); ctx.lineTo(cx,cy+hh2); ctx.lineTo(cx-bw,cy); ctx.closePath(); ctx.fill();
  // Right
  ctx.fillStyle = darkenHex(bcolor,0.35);
  ctx.beginPath(); ctx.moveTo(cx+bw,cy-bh); ctx.lineTo(cx,cy-bh+hh2); ctx.lineTo(cx,cy+hh2); ctx.lineTo(cx+bw,cy); ctx.closePath(); ctx.fill();
  // Windows
  ctx.fillStyle='rgba(255,240,100,0.35)';
  for(let wy=0;wy<3;wy++) for(let wx=0;wx<2;wx++) {
    const wox = cx - bw*0.4 + wx*bw*0.5;
    const woy = cy - bh*0.25 - wy*bh*0.28;
    ctx.fillRect(wox-2, woy-3, 4, 5);
  }
  ctx.restore();
}

function drawIsoTile(col, row) {
  const iso = toIso(col, row);
  const cx = iso.x, cy = iso.y;
  const tc = getTileColor(row);
  const sideH = tc.elevated ? CELL * 0.22 : CELL * 0.08;

  // Side faces (drawn first, behind top)
  isoSideLeft(cx, cy, sideH, tc.side || darkenHex(tc.top, 0.6));
  isoSideRight(cx, cy, sideH, darkenHex(tc.top, 0.75));

  // Top face
  if (row === GOAL_ROW) {
    // Gold glowing goal tile
    const pulse = 0.7 + 0.3 * Math.abs(Math.sin(frameCount * 0.05 + col * 0.3));
    ctx.save();
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 14 * pulse;
    isoTile(cx, cy, tc.top, 'rgba(255,215,0,0.5)');
    // Gold sparkles
    ctx.fillStyle = `rgba(255,215,0,${0.3 * pulse})`;
    ctx.beginPath();
    ctx.arc(cx, cy - CELL * 0.1, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else if (SAFE_ROWS.includes(row)) {
    // Grass tile with slight green glow
    ctx.save();
    ctx.shadowColor = '#00aa44';
    ctx.shadowBlur = 4;
    isoTile(cx, cy, tc.top, 'rgba(60,160,60,0.2)');
    ctx.restore();
    // Small grass tufts
    if ((col + row) % 3 === 0) {
      ctx.save();
      ctx.strokeStyle = 'rgba(80,200,80,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx - 4, cy); ctx.lineTo(cx - 6, cy - 6);
      ctx.moveTo(cx,     cy); ctx.lineTo(cx,     cy - 7);
      ctx.moveTo(cx + 4, cy); ctx.lineTo(cx + 5, cy - 5);
      ctx.stroke();
      ctx.restore();
    }
  } else if (ROAD_ROWS_TOP.includes(row) || ROAD_ROWS_BOT.includes(row)) {
    isoTile(cx, cy, tc.top, 'rgba(80,80,100,0.12)');
    // Lane dashes along the row direction
    const cfg = laneConfigs[row];
    if (cfg && col % 2 === 0) {
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 5]);
      // Dash runs along iso row direction (left to right in iso space)
      const isoL = toIso(col, row);
      const isoR = toIso(col + 1, row);
      ctx.beginPath();
      ctx.moveTo(isoL.x, isoL.y);
      ctx.lineTo(isoR.x, isoR.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
  } else {
    isoTile(cx, cy, tc.top, 'rgba(80,100,80,0.1)');
  }
}

function drawAll() {
  ctx.clearRect(0, 0, W, H);

  // Sky gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0a0520');
  bg.addColorStop(0.4, '#1a0a2e');
  bg.addColorStop(1, '#0d0518');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Stars in sky
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let s = 0; s < 30; s++) {
    const sx = ((s * 137 + frameCount * 0.05) % W);
    const sy = (s * 53) % (H * 0.35);
    ctx.fillRect(sx, sy, 1, 1);
  }

  if (flashEffect > 0) {
    ctx.fillStyle = `rgba(255,50,50,${flashEffect/20*0.25})`;
    ctx.fillRect(0,0,W,H);
  }

  ctx.save();
  applyScreenShake();
  drawIsoGrid();

  // Collect drawables from lane pool
  const drawables = [];
  const firstWR = Math.floor(camRow - 1);
  const lastWR  = Math.ceil(camRow + CAM_VISIBLE_ROWS + 1);

  for (const lane of lanePool) {
    if (lane.index < firstWR || lane.index > lastWR) continue;
    // Vehicles
    for (const v of lane.cars) {
      const vd = { ...v, row: lane.index };
      drawables.push({ depth: v.x + lane.index, type:'vehicle', data: vd });
    }
    // Frog
    if (lane.frog) {
      drawables.push({ depth: lane.frog.col + lane.index + 0.4, type:'frog', data: { col: lane.frog.col, row: lane.index } });
    }
    // Pickup
    if (lane.pickup && !lane.pickup.collected) {
      drawables.push({ depth: lane.pickup.col + lane.index + 0.05, type:'pickup', data: { ...lane.pickup, row: lane.index } });
    }
    // Money
    if (lane.money && !lane.money.collected) {
      drawables.push({ depth: lane.money.col + lane.index + 0.1, type:'money', data: { ...lane.money, row: lane.index } });
    }
  }

  // Duck
  drawables.push({ depth: duck.col + duckWorldRow + 0.5, type:'duck', data: duck });

  drawables.sort((a,b) => a.depth - b.depth);
  for (const d of drawables) {
    if (d.type==='money')   drawIsoMoney(d.data);
    if (d.type==='pickup')  drawIsoPickup(d.data);
    if (d.type==='vehicle') drawIsoVehicle(d.data);
    if (d.type==='frog')    drawIsoFrog(d.data);
    if (d.type==='duck')    drawIsoDuck();
  }

  // Bullets
  for (const b of duckBullets) {
    const iso = toIso(b.x, b.wy !== undefined ? b.wy : b.y);
    ctx.save();
    ctx.shadowColor = '#fff700'; ctx.shadowBlur = 10;
    ctx.strokeStyle = 'rgba(255,220,0,0.5)';
    ctx.lineWidth = 2;
    const isoTail = toIso(b.x - b.vx * 4, b.y - b.vy * 4);
    ctx.beginPath(); ctx.moveTo(iso.x, iso.y); ctx.lineTo(isoTail.x, isoTail.y); ctx.stroke();
    ctx.fillStyle = '#fff700';
    ctx.beginPath(); ctx.arc(iso.x, iso.y, 4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  for (const b of bullets) {
    const iso = toIso(b.x, b.wy !== undefined ? b.wy : b.y);
    ctx.save();
    ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 8;
    const isoTail = toIso(b.x - b.vx * 3, b.y - b.vy * 3);
    ctx.strokeStyle = 'rgba(0,255,136,0.4)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(iso.x, iso.y); ctx.lineTo(isoTail.x, isoTail.y); ctx.stroke();
    ctx.fillStyle = '#00ff88';
    ctx.beginPath(); ctx.arc(iso.x, iso.y, 4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  for (const b of hoodBullets) {
    const iso = toIso(b.x, b.wy !== undefined ? b.wy : b.y);
    ctx.save();
    ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 8;
    const isoTail = toIso(b.x - b.vx * 3, b.y - b.vy * 3);
    ctx.strokeStyle = 'rgba(255,140,0,0.5)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(iso.x, iso.y); ctx.lineTo(isoTail.x, isoTail.y); ctx.stroke();
    ctx.fillStyle = '#ff8800';
    ctx.beginPath(); ctx.arc(iso.x, iso.y, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Particles — convert world to screen each frame
  for (const p of particles) {
    const ps = toIso(p.wx, p.wy);
    ctx.globalAlpha = p.life / 50;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(ps.x, ps.y, 4, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.85);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  ctx.restore(); // restore screen shake
}

function applyScreenShake() {
  if (screenShake > 0) {
    const dx = (Math.random()-0.5) * screenShake * 1.5;
    const dy = (Math.random()-0.5) * screenShake * 1.5;
    ctx.translate(dx, dy);
  }
}

// =============================================
// ISO ENTITY DRAWING
// =============================================

function drawIsoVehicle(v) {
  const iso = toIso(v.x + v.width / 2, v.row);
  const cx = iso.x, cy = iso.y;
  const vw = v.width * CELL * 0.72;
  const hw = vw * 0.5;
  const hh = CELL * 0.375 * 0.6;

  // Vehicle height varies by type
  const heights = { sedan:0.52, suv:0.65, pickup:0.58, bus:0.72, sports:0.38 };
  const vh = CELL * (heights[v.type] || 0.52);

  ctx.save();
  ctx.shadowColor = v.color;
  ctx.shadowBlur = 6;

  // === TOP FACE ===
  ctx.fillStyle = lightenHex(v.color, 0.3);
  ctx.beginPath();
  ctx.moveTo(cx,      cy - vh - hh);
  ctx.lineTo(cx + hw, cy - vh);
  ctx.lineTo(cx,      cy - vh + hh);
  ctx.lineTo(cx - hw, cy - vh);
  ctx.closePath(); ctx.fill();

  // === LEFT FACE ===
  ctx.fillStyle = v.color;
  ctx.beginPath();
  ctx.moveTo(cx - hw, cy - vh);
  ctx.lineTo(cx,      cy - vh + hh);
  ctx.lineTo(cx,      cy + hh);
  ctx.lineTo(cx - hw, cy);
  ctx.closePath(); ctx.fill();

  // === RIGHT FACE (darkest) ===
  ctx.fillStyle = darkenHex(v.color, 0.48);
  ctx.beginPath();
  ctx.moveTo(cx + hw, cy - vh);
  ctx.lineTo(cx,      cy - vh + hh);
  ctx.lineTo(cx,      cy + hh);
  ctx.lineTo(cx + hw, cy);
  ctx.closePath(); ctx.fill();

  ctx.shadowBlur = 0;

  // === TYPE-SPECIFIC DETAILS ===
  if (v.type === 'bus') {
    // Bus: multiple windows on left face
    const winCount = 4;
    for (let i = 0; i < winCount; i++) {
      const t = (i + 0.5) / winCount;
      const wx = cx - hw + t * hw;
      const wy = cy - vh * 0.55;
      ctx.fillStyle = 'rgba(180,230,255,0.55)';
      ctx.fillRect(wx - 3, wy - 4, 5, 7);
    }
    // Bus stripe
    ctx.fillStyle = darkenHex(v.color, 0.25);
    ctx.fillRect(cx - hw, cy - vh * 0.28, hw, vh * 0.1);
  } else if (v.type === 'sports') {
    // Low wide windshield
    ctx.fillStyle = 'rgba(150,230,255,0.5)';
    ctx.beginPath();
    ctx.moveTo(cx - hw*0.3, cy - vh - hh*0.6);
    ctx.lineTo(cx + hw*0.3, cy - vh - hh*0.6);
    ctx.lineTo(cx + hw*0.15, cy - vh - hh*0.1);
    ctx.lineTo(cx - hw*0.15, cy - vh - hh*0.1);
    ctx.closePath(); ctx.fill();
    // Spoiler on right side
    ctx.fillStyle = darkenHex(v.color, 0.3);
    const sx = v.dir === 1 ? cx - hw : cx + hw;
    ctx.fillRect(sx - 2, cy - vh - 4, 4, 6);
  } else if (v.type === 'suv') {
    // SUV: roof rack lines on top
    ctx.strokeStyle = darkenHex(v.color, 0.3);
    ctx.lineWidth = 1;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(cx + i * hw * 0.3, cy - vh - hh);
      ctx.lineTo(cx + i * hw * 0.3 + hh * 0.8, cy - vh);
      ctx.stroke();
    }
    // Windshield
    ctx.fillStyle = 'rgba(140,210,255,0.4)';
    ctx.beginPath();
    ctx.moveTo(cx - hw*0.25, cy - vh - hh*0.55);
    ctx.lineTo(cx + hw*0.25, cy - vh - hh*0.55);
    ctx.lineTo(cx + hw*0.1,  cy - vh + hh*0.1);
    ctx.lineTo(cx - hw*0.1,  cy - vh + hh*0.1);
    ctx.closePath(); ctx.fill();
  } else if (v.type === 'pickup') {
    // Truck bed — darker back half on top face
    ctx.fillStyle = darkenHex(v.color, 0.2);
    ctx.beginPath();
    ctx.moveTo(cx - hw*0.1, cy - vh - hh);
    ctx.lineTo(cx - hw,     cy - vh);
    ctx.lineTo(cx - hw*0.1, cy - vh);
    ctx.closePath(); ctx.fill();
    // Windshield (front)
    ctx.fillStyle = 'rgba(150,220,255,0.4)';
    ctx.beginPath();
    ctx.moveTo(cx + hw*0.05, cy - vh - hh*0.7);
    ctx.lineTo(cx + hw*0.5,  cy - vh - hh*0.35);
    ctx.lineTo(cx + hw*0.4,  cy - vh + hh*0.1);
    ctx.lineTo(cx,           cy - vh + hh*0.1);
    ctx.closePath(); ctx.fill();
  } else {
    // Sedan windshield
    ctx.fillStyle = 'rgba(140,215,255,0.38)';
    ctx.beginPath();
    ctx.moveTo(cx - hw*0.2, cy - vh - hh*0.5);
    ctx.lineTo(cx + hw*0.2, cy - vh - hh*0.5);
    ctx.lineTo(cx + hw*0.08, cy - vh + hh*0.1);
    ctx.lineTo(cx - hw*0.08, cy - vh + hh*0.1);
    ctx.closePath(); ctx.fill();
  }

  // Wheels — two dark ellipses
  ctx.fillStyle = '#111';
  ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
  [[-hw*0.55, hh*0.6],[hw*0.55, -hh*0.2]].forEach(([ox,oy]) => {
    ctx.beginPath();
    ctx.ellipse(cx+ox, cy+oy, CELL*0.09, CELL*0.05, 0, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
  });

  // Headlights
  ctx.shadowColor = '#ffffaa'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#ffffee';
  const lx = v.dir === 1 ? cx + hw - 2 : cx - hw + 2;
  ctx.fillRect(lx - 2, cy - vh * 0.35, 4, vh * 0.18);
  // Tail lights
  ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 6;
  ctx.fillStyle = '#ff2200';
  const tx = v.dir === 1 ? cx - hw + 2 : cx + hw - 2;
  ctx.fillRect(tx - 2, cy - vh * 0.35, 4, vh * 0.18);

  ctx.restore();
}

function drawIsoPickup(p) {
  const bob = Math.sin(frameCount * 0.08 + (p.bob||0)) * 3;
  const iso = toIso(p.col + 0.5, (p.row !== undefined ? p.row : duckWorldRow) + 0.5);
  const cx = iso.x, cy = iso.y - CELL * 0.2 - bob;
  const s = CELL * 0.2;

  ctx.save();

  if (p.kind === 'glock') {
    ctx.shadowColor = '#aaaaff'; ctx.shadowBlur = 12;
    // Gun body (dark gray iso box)
    const hw = s * 0.8, hh2 = s * 0.3, bh = s * 0.5;
    ctx.fillStyle = '#555';
    ctx.beginPath(); ctx.moveTo(cx,cy-bh-hh2); ctx.lineTo(cx+hw,cy-bh); ctx.lineTo(cx,cy-bh+hh2); ctx.lineTo(cx-hw,cy-bh); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#444';
    ctx.beginPath(); ctx.moveTo(cx-hw,cy-bh); ctx.lineTo(cx,cy-bh+hh2); ctx.lineTo(cx,cy+hh2); ctx.lineTo(cx-hw,cy); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.moveTo(cx+hw,cy-bh); ctx.lineTo(cx,cy-bh+hh2); ctx.lineTo(cx,cy+hh2); ctx.lineTo(cx+hw,cy); ctx.closePath(); ctx.fill();
    // Barrel
    ctx.fillStyle = '#666'; ctx.fillRect(cx + hw - 1, cy - bh * 0.6, s * 0.6, s * 0.15);
    // Label
    ctx.fillStyle = 'rgba(180,180,255,0.8)'; ctx.font = `bold ${CELL*0.13}px Courier New`;
    ctx.textAlign = 'center'; ctx.fillText('GLOCK', cx, cy - bh - hh2 - 4);
  } else if (p.kind === 'gold_glock') {
    const pulse = 0.7 + 0.3 * Math.abs(Math.sin(frameCount * 0.07));
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 18 * pulse;
    const hw = s * 0.8, hh2 = s * 0.3, bh = s * 0.5;
    ctx.fillStyle = lightenHex('#cc9900', 0.25);
    ctx.beginPath(); ctx.moveTo(cx,cy-bh-hh2); ctx.lineTo(cx+hw,cy-bh); ctx.lineTo(cx,cy-bh+hh2); ctx.lineTo(cx-hw,cy-bh); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#cc9900';
    ctx.beginPath(); ctx.moveTo(cx-hw,cy-bh); ctx.lineTo(cx,cy-bh+hh2); ctx.lineTo(cx,cy+hh2); ctx.lineTo(cx-hw,cy); ctx.closePath(); ctx.fill();
    ctx.fillStyle = darkenHex('#cc9900', 0.4);
    ctx.beginPath(); ctx.moveTo(cx+hw,cy-bh); ctx.lineTo(cx,cy-bh+hh2); ctx.lineTo(cx,cy+hh2); ctx.lineTo(cx+hw,cy); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ffd700'; ctx.fillRect(cx+hw-1, cy-bh*0.6, s*0.7, s*0.15);
    // Switch indicator dot
    ctx.fillStyle = '#ff4400'; ctx.shadowColor='#ff4400'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(cx, cy-bh-hh2*0.2, s*0.15, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,215,0,0.9)'; ctx.shadowBlur=0; ctx.font = `bold ${CELL*0.13}px Courier New`;
    ctx.textAlign = 'center'; ctx.fillText('GOLD🔥', cx, cy - bh - hh2 - 4);
  } else if (p.kind === 'draco') {
    const pulse = 0.6 + 0.4 * Math.abs(Math.sin(frameCount * 0.05));
    ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 20 * pulse;
    const hw = s * 1.2, hh2 = s * 0.35, bh = s * 0.45;
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.moveTo(cx,cy-bh-hh2); ctx.lineTo(cx+hw,cy-bh); ctx.lineTo(cx,cy-bh+hh2); ctx.lineTo(cx-hw,cy-bh); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.moveTo(cx-hw,cy-bh); ctx.lineTo(cx,cy-bh+hh2); ctx.lineTo(cx,cy+hh2); ctx.lineTo(cx-hw,cy); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#0d0d0d';
    ctx.beginPath(); ctx.moveTo(cx+hw,cy-bh); ctx.lineTo(cx,cy-bh+hh2); ctx.lineTo(cx,cy+hh2); ctx.lineTo(cx+hw,cy); ctx.closePath(); ctx.fill();
    // Barrel (long)
    ctx.fillStyle = '#222'; ctx.fillRect(cx+hw-2, cy-bh*0.7, s*1.0, s*0.18);
    // Drum mag
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(cx, cy, s*0.35, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#ff4400'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(cx, cy, s*0.35, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = 'rgba(255,80,0,0.9)'; ctx.font = `bold ${CELL*0.14}px Courier New`;
    ctx.textAlign = 'center'; ctx.fillText('DRACO🐉', cx, cy - bh - hh2 - 4);
  } else if (p.kind === 'ammo') {
    ctx.shadowColor = '#88ff88'; ctx.shadowBlur = 10;
    // Ammo box — small crate
    const hw = s*0.6, hh2 = s*0.25, bh = s*0.4;
    ctx.fillStyle = '#3a6a2a';
    ctx.beginPath(); ctx.moveTo(cx,cy-bh-hh2); ctx.lineTo(cx+hw,cy-bh); ctx.lineTo(cx,cy-bh+hh2); ctx.lineTo(cx-hw,cy-bh); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#2a4a1a';
    ctx.beginPath(); ctx.moveTo(cx-hw,cy-bh); ctx.lineTo(cx,cy-bh+hh2); ctx.lineTo(cx,cy+hh2); ctx.lineTo(cx-hw,cy); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#1a3a0a';
    ctx.beginPath(); ctx.moveTo(cx+hw,cy-bh); ctx.lineTo(cx,cy-bh+hh2); ctx.lineTo(cx,cy+hh2); ctx.lineTo(cx+hw,cy); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#88ff88'; ctx.lineWidth=1;
    ctx.strokeRect(cx-4, cy-bh-4, 8, 8);
    ctx.fillStyle='#88ff88'; ctx.font=`bold ${CELL*0.13}px Courier New`;
    ctx.textAlign='center'; ctx.fillText('AMMO', cx, cy-bh-hh2-4);
  }

  ctx.restore();
}

function drawIsoFrog(frog) {
  const bob = Math.sin(frameCount * 0.06 + frog.col * 1.3) * 2;
  const iso = toIso(frog.col + 0.5, (frog.row !== undefined ? frog.row : frog.wy) + 0.5);
  const cx = iso.x, cy = iso.y - CELL * 0.25 - bob;
  const r = CELL * 0.22;

  ctx.save();
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 10;

  // Shadow on tile
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(iso.x, iso.y, r * 0.8, r * 0.3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  // Body box (iso style)
  const bh = r * 1.2;
  const bw = r * 0.9;
  const hh2 = CELL * 0.375 * 0.5;

  // Top
  ctx.fillStyle = '#22aa55';
  ctx.beginPath();
  ctx.moveTo(cx,      cy - bh - hh2);
  ctx.lineTo(cx + bw, cy - bh);
  ctx.lineTo(cx,      cy - bh + hh2);
  ctx.lineTo(cx - bw, cy - bh);
  ctx.closePath(); ctx.fill();

  // Left
  ctx.fillStyle = '#00aa44';
  ctx.beginPath();
  ctx.moveTo(cx - bw, cy - bh);
  ctx.lineTo(cx,      cy - bh + hh2);
  ctx.lineTo(cx,      cy + hh2);
  ctx.lineTo(cx - bw, cy);
  ctx.closePath(); ctx.fill();

  // Right
  ctx.fillStyle = '#006622';
  ctx.beginPath();
  ctx.moveTo(cx + bw, cy - bh);
  ctx.lineTo(cx,      cy - bh + hh2);
  ctx.lineTo(cx,      cy + hh2);
  ctx.lineTo(cx + bw, cy);
  ctx.closePath(); ctx.fill();

  ctx.shadowBlur = 0;

  // Angry eyes on top face
  ctx.fillStyle = '#cc0000';
  ctx.beginPath(); ctx.arc(cx - r * 0.3, cy - bh - hh2 * 0.3, r * 0.18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + r * 0.3, cy - bh - hh2 * 0.3, r * 0.18, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx - r * 0.28, cy - bh - hh2 * 0.35, r * 0.07, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + r * 0.32, cy - bh - hh2 * 0.35, r * 0.07, 0, Math.PI*2); ctx.fill();

  // Mini gun sticking out from right face
  ctx.fillStyle = '#444';
  ctx.fillRect(cx + bw - 1, cy - bh * 0.5, r * 0.7, r * 0.15);

  ctx.restore();
}

function drawIsoHoodEnemy(he) {
  const bob = Math.sin(frameCount * 0.05 + he.col) * 1.5;
  const iso = toIso(he.col + 0.5, (he.row || he.wy || duckWorldRow) + 0.5);
  const cx = iso.x, cy = iso.y - CELL * 0.3 - bob;
  const r = CELL * 0.2;
  const bh = r * 1.6;
  const bw = r * 0.85;
  const hh2 = CELL * 0.375 * 0.45;

  ctx.save();
  ctx.shadowColor = '#ff4400';
  ctx.shadowBlur = 8;

  // Shadow
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(iso.x, iso.y, r * 0.8, r * 0.25, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // Dark hoodie body (iso box)
  ctx.fillStyle = '#2a2a2a';
  ctx.beginPath();
  ctx.moveTo(cx,      cy - bh - hh2);
  ctx.lineTo(cx + bw, cy - bh);
  ctx.lineTo(cx,      cy - bh + hh2);
  ctx.lineTo(cx - bw, cy - bh);
  ctx.closePath(); ctx.fill();

  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.moveTo(cx - bw, cy - bh);
  ctx.lineTo(cx,      cy - bh + hh2);
  ctx.lineTo(cx,      cy + hh2);
  ctx.lineTo(cx - bw, cy);
  ctx.closePath(); ctx.fill();

  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.moveTo(cx + bw, cy - bh);
  ctx.lineTo(cx,      cy - bh + hh2);
  ctx.lineTo(cx,      cy + hh2);
  ctx.lineTo(cx + bw, cy);
  ctx.closePath(); ctx.fill();

  ctx.shadowBlur = 0;

  // Head (small circle on top)
  const headY = cy - bh - hh2 - r * 0.8;
  ctx.fillStyle = '#6B4226';
  ctx.beginPath(); ctx.arc(cx, headY, r * 0.65, 0, Math.PI*2); ctx.fill();

  // White du-rag on head
  ctx.fillStyle = 'rgba(240,240,240,0.92)';
  ctx.beginPath();
  ctx.arc(cx, headY, r * 0.68, Math.PI, 0, false);
  ctx.fill();

  // Red eyes
  ctx.fillStyle = '#cc2200';
  ctx.beginPath(); ctx.arc(cx - r * 0.22, headY, r * 0.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + r * 0.22, headY, r * 0.1, 0, Math.PI*2); ctx.fill();

  // Gold chain
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 3;
  ctx.beginPath();
  ctx.arc(cx, cy - bh * 0.3, r * 0.5, Math.PI * 0.6, Math.PI * 2.4, false);
  ctx.stroke();

  ctx.restore();
}

function drawIsoDuck() {
  const bob = Math.sin(frameCount * 0.08) * 2.5;
  const iso = toIso(duck.col + 0.5, duckWorldRow + duckSubRow);
  const cx = iso.x, cy = iso.y - CELL * 0.35 - bob;
  const r = CELL * 0.26;

  ctx.save();

  // Invincibility blink
  if (invincible > 0 && Math.floor(invincible / 6) % 2 === 0) ctx.globalAlpha = 0.3;

  ctx.shadowColor = '#fff700';
  ctx.shadowBlur = invincible > 0 ? 20 : 6;

  // Shadow on tile
  const prevAlpha2 = ctx.globalAlpha;
  ctx.globalAlpha *= 0.3;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(iso.x, iso.y, r * 0.9, r * 0.3, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = prevAlpha2;

  // Body — fluffy white blob (iso style: slightly 3D ellipse)
  const bodyGrad = ctx.createRadialGradient(cx - r * 0.2, cy - r * 0.2, r * 0.1, cx, cy, r);
  bodyGrad.addColorStop(0, '#fffff0');
  bodyGrad.addColorStop(0.6, '#fffde7');
  bodyGrad.addColorStop(1, '#e0d8b0');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(cx, cy + r * 0.1, r, r * 0.75, 0, 0, Math.PI * 2);
  ctx.fill();

  // Fluffy puffs around body
  ctx.fillStyle = 'rgba(255,255,230,0.65)';
  const puffs = [[-r*0.6,-r*0.2,r*0.28],[r*0.6,-r*0.2,r*0.28],[0,-r*0.5,r*0.32],[-r*0.35,r*0.35,r*0.22],[r*0.35,r*0.35,r*0.22]];
  for (const [px,py,pr] of puffs) {
    ctx.beginPath(); ctx.arc(cx+px, cy+py, pr, 0, Math.PI*2); ctx.fill();
  }

  ctx.shadowBlur = 0;

  // Head
  const headX = cx + r * 0.15;
  const headY = cy - r * 0.65;
  const hr = r * 0.42;

  ctx.fillStyle = '#fffde7';
  ctx.beginPath(); ctx.arc(headX, headY, hr, 0, Math.PI*2); ctx.fill();

  // Eye
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(headX + hr*0.4, headY - hr*0.2, hr*0.13, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(headX + hr*0.46, headY - hr*0.25, hr*0.04, 0, Math.PI*2); ctx.fill();

  // Bill
  ctx.fillStyle = '#ff8c00';
  ctx.beginPath();
  ctx.ellipse(headX + hr * 0.78, headY - hr * 0.1, hr * 0.3, hr * 0.13, 0, 0, Math.PI*2);
  ctx.fill();

  // Do-rag (black cap)
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(headX, headY, hr * 1.05, Math.PI * 0.93, Math.PI * 2.07, false);
  ctx.fill();
  // Do-rag shine
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.beginPath();
  ctx.arc(headX + hr*0.1, headY - hr * 0.5, hr * 0.5, Math.PI * 1.1, Math.PI * 1.7, false);
  ctx.fill();
  // Knot
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.ellipse(headX - hr*0.82, headY + hr*0.1, hr*0.18, hr*0.1, 0.5, 0, Math.PI*2); ctx.fill();
  // Tail
  const tailSway = Math.sin(frameCount * 0.05) * 2;
  ctx.fillStyle = '#0d0d0d';
  ctx.beginPath();
  ctx.moveTo(headX - hr*0.6, headY + hr*0.2);
  ctx.bezierCurveTo(headX-hr*1.2+tailSway, headY+hr*0.5, headX-hr*1.4+tailSway, headY+hr*0.9, headX-hr*1.0+tailSway, headY+hr*1.05);
  ctx.bezierCurveTo(headX-hr*0.6, headY+hr*0.95, headX-hr*0.3, headY+hr*0.5, headX-hr*0.15, headY+hr*0.2);
  ctx.fill();

  // Legs
  const legSwing = Math.sin(frameCount * 0.16) * r * 0.06;
  ctx.fillStyle = '#ff8c00';
  ctx.fillRect(cx - r*0.28 - legSwing, cy + r*0.8, r*0.15, r*0.24);
  ctx.fillRect(cx + r*0.13 + legSwing, cy + r*0.8, r*0.15, r*0.24);
  ctx.fillRect(cx - r*0.38 - legSwing, cy + r*1.04, r*0.32, r*0.08);
  ctx.fillRect(cx + r*0.03 + legSwing, cy + r*1.04, r*0.32, r*0.08);

  ctx.restore();
}

function drawIsoMoney(m) {
  const bob = Math.sin(frameCount * 0.07 + (m.bob||0)) * 2.5;
  const iso = toIso(m.col + 0.5, (m.row !== undefined ? m.row : duckWorldRow) + 0.5);
  const cx = iso.x, cy = iso.y - CELL * 0.15 - bob;
  const s = CELL * 0.18;
  const hh2 = s * 0.5;

  ctx.save();
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 8;

  // Stack of 3 iso boxes
  for (let i = 2; i >= 0; i--) {
    const lift = i * s * 0.8;
    const shade = ['#007722','#009933','#00cc44'][i];
    const hw = s * 0.7;

    ctx.fillStyle = lightenHex(shade, 0.2);
    ctx.beginPath();
    ctx.moveTo(cx,      cy - lift - hh2);
    ctx.lineTo(cx + hw, cy - lift);
    ctx.lineTo(cx,      cy - lift + hh2);
    ctx.lineTo(cx - hw, cy - lift);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = shade;
    ctx.beginPath();
    ctx.moveTo(cx - hw, cy - lift);
    ctx.lineTo(cx,      cy - lift + hh2);
    ctx.lineTo(cx,      cy - lift + hh2 + s * 0.6);
    ctx.lineTo(cx - hw, cy - lift + s * 0.6);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = darkenHex(shade, 0.55);
    ctx.beginPath();
    ctx.moveTo(cx + hw, cy - lift);
    ctx.lineTo(cx,      cy - lift + hh2);
    ctx.lineTo(cx,      cy - lift + hh2 + s * 0.6);
    ctx.lineTo(cx + hw, cy - lift + s * 0.6);
    ctx.closePath(); ctx.fill();
  }

  ctx.shadowBlur = 0;
  // Dollar sign on top
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${CELL * 0.18}px Courier New`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('$', cx, cy - s * 1.8);

  ctx.restore();
}

function drawIsoGoalCar() {
  const lvl = LEVELS[currentLevel - 1];
  const carColor = lvl.goalColor;
  const carName = lvl.goalName;

  const col = Math.floor(COLS / 2);
  const iso = toIso(col + 0.5, GOAL_ROW + 0.5);
  const cx = iso.x, cy = iso.y - CELL * 0.5;
  const pulse = 0.7 + 0.3 * Math.abs(Math.sin(frameCount * 0.05));
  const cw = CELL * 0.85; // half-width
  const ch = CELL * 0.45; // car box height
  const hh2 = CELL * 0.375 * 0.7;

  ctx.save();
  ctx.shadowColor = carColor;
  ctx.shadowBlur = 22 * pulse;

  // Car body — iso box
  const cTop = currentLevel === 1 ? '#f0f0f0' : (currentLevel === 2 ? '#ffe033' : '#4499ff');
  const cMid = carColor;
  const cDark = darkenHex(carColor === '#ffffff' ? '#aaaaaa' : carColor, 0.5);

  // Top face
  ctx.fillStyle = lightenHex(cTop, 0.15);
  ctx.beginPath();
  ctx.moveTo(cx,      cy - ch - hh2);
  ctx.lineTo(cx + cw, cy - ch);
  ctx.lineTo(cx,      cy - ch + hh2);
  ctx.lineTo(cx - cw, cy - ch);
  ctx.closePath(); ctx.fill();

  // Windshield on top
  ctx.fillStyle = 'rgba(150,220,255,0.45)';
  ctx.beginPath();
  ctx.moveTo(cx - cw*0.25, cy - ch - hh2 * 0.4);
  ctx.lineTo(cx + cw*0.25, cy - ch - hh2 * 0.4);
  ctx.lineTo(cx + cw*0.15, cy - ch + hh2 * 0.1);
  ctx.lineTo(cx - cw*0.15, cy - ch + hh2 * 0.1);
  ctx.closePath(); ctx.fill();

  // Left face
  ctx.fillStyle = cMid;
  ctx.beginPath();
  ctx.moveTo(cx - cw, cy - ch);
  ctx.lineTo(cx,      cy - ch + hh2);
  ctx.lineTo(cx,      cy + hh2);
  ctx.lineTo(cx - cw, cy);
  ctx.closePath(); ctx.fill();

  // Right face
  ctx.fillStyle = cDark;
  ctx.beginPath();
  ctx.moveTo(cx + cw, cy - ch);
  ctx.lineTo(cx,      cy - ch + hh2);
  ctx.lineTo(cx,      cy + hh2);
  ctx.lineTo(cx + cw, cy);
  ctx.closePath(); ctx.fill();

  // Wheels (small dark ellipses at corners)
  ctx.fillStyle = '#111';
  ctx.shadowBlur = 0;
  [[cx - cw * 0.6, cy - ch * 0.3],[cx + cw * 0.6, cy - ch * 0.3],[cx - cw * 0.5, cy + hh2 * 0.5],[cx + cw * 0.5, cy + hh2 * 0.5]].forEach(([wx, wy]) => {
    ctx.beginPath(); ctx.ellipse(wx, wy, CELL * 0.1, CELL * 0.06, 0, 0, Math.PI*2); ctx.fill();
  });

  // Car name label above
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = `bold ${CELL * 0.15}px Courier New`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(carName.toUpperCase(), cx, cy - ch - hh2 - 4);

  ctx.restore();
}

// =============================================
// COLOR HELPERS
// =============================================
function lightenHex(hex, factor) {
  // Factor 0-1: 1 = white
  let r, g, b;
  if (hex.startsWith('#')) {
    const n = parseInt(hex.slice(1), 16);
    r = (n >> 16) & 0xff;
    g = (n >> 8)  & 0xff;
    b =  n        & 0xff;
  } else {
    // Handle rgb(...)
    const m = hex.match(/\d+/g);
    [r, g, b] = m ? [+m[0], +m[1], +m[2]] : [128, 128, 128];
  }
  r = Math.min(255, Math.round(r + (255 - r) * factor));
  g = Math.min(255, Math.round(g + (255 - g) * factor));
  b = Math.min(255, Math.round(b + (255 - b) * factor));
  return `rgb(${r},${g},${b})`;
}

function darkenHex(hex, factor) {
  // Factor 0-1: 1 = black
  let r, g, b;
  if (hex.startsWith('#')) {
    const n = parseInt(hex.slice(1), 16);
    r = (n >> 16) & 0xff;
    g = (n >> 8)  & 0xff;
    b =  n        & 0xff;
  } else {
    const m = hex.match(/\d+/g);
    [r, g, b] = m ? [+m[0], +m[1], +m[2]] : [128, 128, 128];
  }
  r = Math.max(0, Math.round(r * (1 - factor)));
  g = Math.max(0, Math.round(g * (1 - factor)));
  b = Math.max(0, Math.round(b * (1 - factor)));
  return `rgb(${r},${g},${b})`;
}

// Legacy helpers (kept for compatibility — not used in iso draw)
function lightenColor(hex, amt) { return lightenHex(hex, amt / 255); }
function darkenColor(hex, amt)  { return darkenHex(hex, amt / 255); }
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y);
  c.quadraticCurveTo(x+w,y,x+w,y+r); c.lineTo(x+w,y+h-r);
  c.quadraticCurveTo(x+w,y+h,x+w-r,y+h); c.lineTo(x+r,y+h);
  c.quadraticCurveTo(x,y+h,x,y+h-r); c.lineTo(x,y+r);
  c.quadraticCurveTo(x,y,x+r,y); c.closePath();
}
</script>
